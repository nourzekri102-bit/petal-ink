<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petal & Ink</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Poppins:wght@300;400;500;600&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blush:#FDF3F5;
    --paper:#FFFCF7;
    --petal:#F3C6D0;
    --petal-deep:#E8A6B6;
    --sage:#B7CDA8;
    --sage-deep:#93AF82;
    --lavender:#C9BFE8;
    --lavender-deep:#A79BD4;
    --plum:#4A3550;
    --plum-soft:#7A6584;
    --gold:#D9A441;
    --gold-deep:#C08A2C;
    --shadow: 0 10px 30px -12px rgba(74,53,80,0.25);
    --radius: 22px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Poppins',sans-serif;
    background:var(--blush);
    color:var(--plum);
    min-height:100vh;
    overflow-x:hidden;
  }
  .font-display{font-family:'Playfair Display',serif;}
  .font-script{font-family:'Caveat',cursive;}

  /* ---------- decorative blobs ---------- */
  .blob{position:fixed;border-radius:50%;filter:blur(50px);opacity:0.55;z-index:0;pointer-events:none;}
  #app{position:relative;z-index:1;min-height:100vh;}

  .screen{display:none;min-height:100vh;width:100%;}
  .screen.active{display:flex;flex-direction:column;}

  button{font-family:'Poppins',sans-serif;cursor:pointer;border:none;}
  input, textarea{font-family:'Poppins',sans-serif;}
  button:focus-visible, input:focus-visible, textarea:focus-visible, [tabindex]:focus-visible{
    outline:3px solid var(--lavender-deep); outline-offset:2px;
  }

  .btn-primary{
    background:linear-gradient(135deg, var(--gold), var(--gold-deep));
    color:#fff; padding:13px 28px; border-radius:999px; font-weight:500;
    font-size:15px; box-shadow:0 8px 20px -8px rgba(192,138,44,0.6);
    transition:transform .15s ease;
  }
  .btn-primary:hover{transform:translateY(-2px);}
  .btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

  .btn-ghost{
    background:transparent;color:var(--plum-soft);padding:10px 18px;
    border-radius:999px;font-size:14px;border:1.5px solid rgba(74,53,80,0.18);
    transition:all .15s ease;
  }
  .btn-ghost:hover{border-color:var(--plum-soft);color:var(--plum);}

  /* ---------- LANDING ---------- */
  #screen-landing{align-items:center;justify-content:center;text-align:center;padding:24px;}
  .landing-mark{width:64px;height:64px;margin:0 auto 18px;}
  .landing-title{font-size:clamp(38px,7vw,58px);margin:0 0 6px;color:var(--plum);}
  .landing-tag{font-size:16px;color:var(--plum-soft);margin:0 0 36px;font-style:italic;font-family:'Playfair Display',serif;}
  .landing-card{background:var(--paper);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow);max-width:380px;width:100%;}
  .field-label{display:block;text-align:left;font-size:13px;color:var(--plum-soft);margin-bottom:6px;font-weight:500;}
  .text-input{
    width:100%;padding:12px 16px;border-radius:14px;border:1.5px solid rgba(74,53,80,0.15);
    background:#fff;font-size:15px;color:var(--plum);margin-bottom:16px;
  }
  .text-input:focus{border-color:var(--lavender-deep);}
  .landing-divider{margin:22px 0;color:var(--plum-soft);font-size:13px;display:flex;align-items:center;gap:10px;}
  .landing-divider::before,.landing-divider::after{content:"";flex:1;height:1px;background:rgba(74,53,80,0.15);}

  /* ---------- DASHBOARD ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;flex-wrap:wrap;gap:12px;}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-size:22px;color:var(--plum);}
  .brand svg{width:28px;height:28px;}
  .dash-main{padding:8px 32px 60px;max-width:1080px;margin:0 auto;width:100%;}
  .dash-heading{display:flex;justify-content:space-between;align-items:center;margin:18px 0 26px;flex-wrap:wrap;gap:14px;}
  .dash-heading h1{font-size:26px;margin:0;}
  .letters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px;}
  .letter-card{
    background:var(--paper);border-radius:18px;padding:0;overflow:hidden;box-shadow:var(--shadow);
    cursor:pointer;transition:transform .15s ease;border:none;text-align:left;
  }
  .letter-card:hover{transform:translateY(-4px);}
  .letter-thumb{height:110px;position:relative;}
  .letter-body-pad{padding:16px 18px;}
  .letter-card h3{margin:0 0 4px;font-size:17px;font-family:'Playfair Display',serif;color:var(--plum);}
  .letter-meta{font-size:12px;color:var(--plum-soft);display:flex;justify-content:space-between;align-items:center;}
  .status-pill{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:500;}
  .status-draft{background:rgba(201,191,232,0.35);color:#5b4f8a;}
  .status-sent{background:rgba(183,205,168,0.4);color:#476336;}
  .empty-state{text-align:center;padding:70px 20px;color:var(--plum-soft);}
  .empty-state svg{width:56px;height:56px;margin-bottom:14px;opacity:0.6;}

  /* ---------- EDITOR ---------- */
  #screen-editor{display:none;}
  #screen-editor.active{display:flex;}
  .editor-wrap{display:flex;flex:1;width:100%;max-width:1280px;margin:0 auto;gap:0;flex-wrap:wrap;}
  .editor-rail{
    width:320px;flex-shrink:0;padding:22px;background:rgba(255,255,255,0.55);
    max-height:100vh;overflow-y:auto;
  }
  .rail-section{margin-bottom:26px;}
  .rail-label{font-size:12px;text-transform:uppercase;letter-spacing:0.06em;color:var(--plum-soft);font-weight:600;margin-bottom:10px;display:block;}
  .scene-options{display:flex;gap:10px;}
  .scene-swatch{
    width:64px;height:64px;border-radius:14px;border:2.5px solid transparent;cursor:pointer;flex-shrink:0;
    position:relative;
  }
  .scene-swatch.selected{border-color:var(--plum);}
  .color-options{display:flex;gap:8px;flex-wrap:wrap;}
  .color-dot{width:32px;height:32px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;}
  .color-dot.selected{border-color:var(--plum);}
  .sticker-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
  .sticker-btn{
    font-size:22px;background:#fff;border-radius:10px;padding:6px 0;
    box-shadow:0 2px 6px rgba(74,53,80,0.08);transition:transform .1s ease;
  }
  .sticker-btn:hover{transform:scale(1.12);}
  .anim-options{display:flex;flex-direction:column;gap:8px;}
  .anim-choice{
    display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;
    background:#fff;border:1.5px solid transparent;font-size:13px;color:var(--plum);text-align:left;
  }
  .anim-choice.selected{border-color:var(--gold-deep);background:#fffaf0;}
  .anim-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;}

  .editor-preview-col{flex:1;min-width:320px;padding:28px 24px;display:flex;flex-direction:column;align-items:center;gap:16px;}
  .preview-frame{
    width:100%;max-width:420px;aspect-ratio:3/4;border-radius:20px;position:relative;overflow:hidden;
    box-shadow:0 20px 45px -18px rgba(74,53,80,0.4);
  }
  .preview-canvas{position:absolute;inset:0;}
  .sticker-el{position:absolute;font-size:28px;user-select:none;cursor:grab;touch-action:none;line-height:1;filter:drop-shadow(0 3px 4px rgba(0,0,0,0.15));}
  .sticker-el.dragging{cursor:grabbing;z-index:50;}
  .sticker-remove{
    position:absolute;top:-9px;right:-9px;width:18px;height:18px;border-radius:50%;
    background:var(--plum);color:#fff;font-size:11px;line-height:18px;text-align:center;display:none;
  }
  .sticker-el.selected .sticker-remove{display:block;}
  .preview-text-area{position:absolute;left:9%;right:9%;top:16%;bottom:16%;overflow:hidden;text-align:center;}
  .preview-title-txt{font-family:'Playfair Display',serif;font-size:20px;margin:0 0 10px;font-weight:600;}
  .preview-body-txt{font-family:'Caveat',cursive;font-size:22px;line-height:1.35;white-space:pre-wrap;}

  .text-controls{width:100%;max-width:420px;display:flex;flex-direction:column;gap:10px;}
  .letter-title-input{
    font-family:'Playfair Display',serif;font-size:18px;padding:10px 14px;border-radius:12px;
    border:1.5px solid rgba(74,53,80,0.15);background:#fff;
  }
  .letter-body-input{
    font-family:'Caveat',cursive;font-size:19px;padding:12px 14px;border-radius:12px;
    border:1.5px solid rgba(74,53,80,0.15);background:#fff;min-height:110px;resize:vertical;
  }
  .editor-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;max-width:420px;}

  /* scene backgrounds */
  .scene-garden{background:linear-gradient(160deg,#fbeaf0 0%,#f3d9d9 45%,#e6ecd6 100%);}
  .scene-dusk{background:linear-gradient(160deg,#d9c9ef 0%,#b9a9d9 50%,#7d6ba3 100%);}
  .scene-rosewater{background:linear-gradient(160deg,#fdece0 0%,#fbd4d9 55%,#f3c6d0 100%);}

  /* ---------- SHARE MODAL ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(74,53,80,0.35);display:none;align-items:center;justify-content:center;
    z-index:200;padding:20px;
  }
  .modal-overlay.active{display:flex;}
  .modal-card{background:var(--paper);border-radius:20px;padding:30px;max-width:400px;width:100%;text-align:center;box-shadow:var(--shadow);}
  .code-display{
    font-family:'Playfair Display',serif;font-size:24px;letter-spacing:2px;background:var(--blush);
    padding:14px;border-radius:12px;margin:16px 0;color:var(--plum);word-break:break-all;
  }

  /* ---------- VIEWER ---------- */
  #screen-viewer-entry{align-items:center;justify-content:center;text-align:center;padding:24px;}
  #screen-viewer{align-items:center;justify-content:center;position:relative;overflow:hidden;padding:20px;}
  .viewer-stage{width:100%;max-width:460px;aspect-ratio:3/4;position:relative;display:flex;align-items:center;justify-content:center;}
  .envelope{
    width:180px;height:130px;position:relative;cursor:pointer;z-index:5;
    transition:opacity .6s ease, transform .6s ease;
  }
  .envelope-body{
    position:absolute;inset:0;background:var(--paper);border-radius:8px;box-shadow:0 15px 30px -10px rgba(74,53,80,0.4);
  }
  .envelope-flap{
    position:absolute;top:0;left:0;right:0;height:65%;
    background:var(--petal-deep);
    clip-path:polygon(0 0,100% 0,50% 100%);
    transform-origin:top center;transition:transform 1s ease;
  }
  .wax-seal{
    position:absolute;top:52%;left:50%;transform:translate(-50%,-50%);width:46px;height:46px;
    background:radial-gradient(circle at 35% 30%, var(--gold), var(--gold-deep));
    border-radius:50%;box-shadow:0 3px 8px rgba(0,0,0,0.25);z-index:6;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;transition:transform .4s ease, opacity .4s ease;
  }
  .envelope.opening .envelope-flap{transform:rotateX(180deg);}
  .envelope.opening .wax-seal{transform:translate(-50%,-50%) scale(0);opacity:0;}
  .envelope.hidden{opacity:0;transform:scale(0.6);pointer-events:none;}

  .bloom-petal{
    position:absolute;border-radius:50% 50% 50% 0;opacity:0;pointer-events:none;
  }

  .viewer-letter{
    position:absolute;inset:0;border-radius:20px;overflow:hidden;opacity:0;transform:translateY(30px) scale(0.96);
    transition:opacity .9s ease, transform .9s ease;box-shadow:0 20px 45px -18px rgba(74,53,80,0.4);
  }
  .viewer-letter.show{opacity:1;transform:translateY(0) scale(1);}

  .firefly{position:absolute;width:6px;height:6px;border-radius:50%;background:#fff3b0;box-shadow:0 0 8px 3px rgba(255,243,176,0.8);opacity:0;}
  @keyframes floatFly{0%{opacity:0;transform:translateY(0);}20%{opacity:1;}100%{opacity:0;transform:translateY(-40px);}}
  @keyframes fallPetal{0%{opacity:0;transform:translateY(-20px) rotate(0deg);}15%{opacity:0.9;}100%{opacity:0;transform:translateY(140px) rotate(200deg);}}
  @keyframes riseIn{0%{opacity:0;transform:translateY(24px);}100%{opacity:1;transform:translateY(0);}}

  @media (prefers-reduced-motion: reduce){
    .envelope, .envelope-flap, .wax-seal, .viewer-letter, .bloom-petal, .firefly{transition:none !important;animation:none !important;}
    .viewer-letter.show{opacity:1;transform:none;}
  }

  @media (max-width:720px){
    .editor-wrap{flex-direction:column;}
    .editor-rail{width:100%;max-height:none;}
    .topbar{padding:16px 18px;}
    .dash-main{padding:0 18px 50px;}
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <clipPath id="none"></clipPath>
  </defs>
</svg>

<div class="blob" style="width:340px;height:340px;background:var(--petal);top:-100px;left:-80px;"></div>
<div class="blob" style="width:300px;height:300px;background:var(--lavender);bottom:-90px;right:-60px;"></div>
<div class="blob" style="width:220px;height:220px;background:var(--sage);top:40%;right:10%;opacity:0.3;"></div>

<div id="app">

  <!-- ============ LANDING ============ -->
  <div class="screen active" id="screen-landing">
    <div>
      <svg class="landing-mark" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="30" fill="var(--gold)"/>
        <path d="M32 18c3 3 3 8 0 11 -3-3-3-8 0-11z" fill="#fff" opacity="0.9"/>
        <path d="M32 46c3-3 3-8 0-11 -3 3-3 8 0 11z" fill="#fff" opacity="0.9"/>
        <path d="M18 32c3-3 8-3 11 0 -3 3-8 3-11 0z" fill="#fff" opacity="0.9"/>
        <path d="M46 32c-3-3-8-3-11 0 3 3 8 3 11 0z" fill="#fff" opacity="0.9"/>
      </svg>
      <h1 class="landing-title font-display">Petal &amp; Ink</h1>
      <p class="landing-tag">letters, dressed up in bloom</p>
      <div class="landing-card">
        <label class="field-label" for="name-input">What should we call you?</label>
        <input class="text-input" id="name-input" placeholder="Your name" maxlength="30">
        <button class="btn-primary" style="width:100%" id="begin-btn">Begin a letter →</button>
        <div class="landing-divider">or</div>
        <button class="btn-ghost" style="width:100%" id="have-code-btn">I have a letter to open</button>
      </div>
    </div>
  </div>

  <!-- ============ VIEWER ENTRY ============ -->
  <div class="screen" id="screen-viewer-entry">
    <div>
      <h1 class="landing-title font-display" style="font-size:32px">Open a letter</h1>
      <p class="landing-tag">enter the code someone sent you</p>
      <div class="landing-card">
        <label class="field-label" for="code-input">Letter code</label>
        <input class="text-input" id="code-input" placeholder="e.g. 8f2a-91cd">
        <button class="btn-primary" style="width:100%" id="open-code-btn">Open →</button>
        <div style="margin-top:16px;">
          <button class="btn-ghost" id="back-to-landing-btn">← Back</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ DASHBOARD ============ -->
  <div class="screen" id="screen-dashboard">
    <div class="topbar">
      <div class="brand">
        <svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="30" fill="var(--gold)"/><path d="M32 18c3 3 3 8 0 11 -3-3-3-8 0-11z" fill="#fff" opacity="0.9"/><path d="M32 46c3-3 3-8 0-11 -3 3-3 8 0 11z" fill="#fff" opacity="0.9"/><path d="M18 32c3-3 8-3 11 0 -3 3-8 3-11 0z" fill="#fff" opacity="0.9"/><path d="M46 32c-3-3-8-3-11 0 3 3 8 3 11 0z" fill="#fff" opacity="0.9"/></svg>
        Petal &amp; Ink
      </div>
      <button class="btn-ghost" id="open-code-from-dash-btn">Open a letter with a code</button>
    </div>
    <div class="dash-main">
      <div class="dash-heading">
        <h1 class="font-display" id="dash-greeting">Your letters</h1>
        <button class="btn-primary" id="new-letter-btn">+ New letter</button>
      </div>
      <div id="letters-grid" class="letters-grid"></div>
    </div>
  </div>

  <!-- ============ EDITOR ============ -->
  <div class="screen" id="screen-editor">
    <div class="editor-wrap">
      <div class="editor-rail">
        <button class="btn-ghost" id="back-to-dash-btn" style="margin-bottom:18px;">← All letters</button>

        <div class="rail-section">
          <span class="rail-label">Scene</span>
          <div class="scene-options" id="scene-options"></div>
        </div>

        <div class="rail-section">
          <span class="rail-label">Accent color</span>
          <div class="color-options" id="color-options"></div>
        </div>

        <div class="rail-section">
          <span class="rail-label">Stickers — click to place</span>
          <div class="sticker-grid" id="sticker-grid"></div>
        </div>

        <div class="rail-section">
          <span class="rail-label">Reveal animation</span>
          <div class="anim-options" id="anim-options"></div>
        </div>
      </div>

      <div class="editor-preview-col">
        <div class="preview-frame" id="preview-frame">
          <div class="preview-canvas" id="preview-canvas">
            <div class="preview-text-area">
              <h3 class="preview-title-txt" id="preview-title-txt"></h3>
              <div class="preview-body-txt" id="preview-body-txt"></div>
            </div>
          </div>
        </div>

        <div class="text-controls">
          <input class="letter-title-input" id="title-input" placeholder="A little heading… (e.g. Open when you graduate)">
          <textarea class="letter-body-input" id="body-input" placeholder="Write from the heart…"></textarea>
        </div>

        <div class="editor-actions">
          <button class="btn-ghost" id="save-draft-btn">Save draft</button>
          <button class="btn-primary" id="get-link-btn">Save &amp; get share link</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ VIEWER (reveal) ============ -->
  <div class="screen" id="screen-viewer">
    <div class="viewer-stage" id="viewer-stage">
      <div class="envelope" id="envelope">
        <div class="envelope-body"></div>
        <div class="envelope-flap"></div>
        <div class="wax-seal">✦</div>
      </div>
      <div class="viewer-letter" id="viewer-letter">
        <div class="preview-text-area" style="top:14%;bottom:14%;">
          <h3 class="preview-title-txt" id="viewer-title-txt"></h3>
          <div class="preview-body-txt" id="viewer-body-txt"></div>
        </div>
      </div>
    </div>
    <p style="color:var(--plum-soft);font-size:13px;margin-top:14px;" id="viewer-hint">tap the envelope to open</p>
  </div>

</div>

<!-- ============ SHARE MODAL ============ -->
<div class="modal-overlay" id="share-modal">
  <div class="modal-card">
    <h2 class="font-display" style="margin:0 0 6px;">Ready to send 💌</h2>
    <p style="color:var(--plum-soft);font-size:14px;margin:0 0 6px;">Share this code, or the link — either opens the reveal.</p>
    <div class="code-display" id="modal-code"></div>
    <button class="btn-primary" id="copy-link-btn" style="width:100%;margin-bottom:10px;">Copy link</button>
    <button class="btn-ghost" id="close-modal-btn" style="width:100%;">Done</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  const SCENES = [
    {id:'garden', label:'Garden Morning', class:'scene-garden'},
    {id:'dusk', label:'Dusk Meadow', class:'scene-dusk'},
    {id:'rosewater', label:'Rosewater Clouds', class:'scene-rosewater'}
  ];
  const ACCENTS = ['#4A3550','#C08A2C','#93AF82','#A79BD4','#E8A6B6','#7A6584'];
  const STICKERS = ['🌸','🌷','🌻','🌹','🦋','💌','💕','✨','🕊️','🌿','⭐','🌙'];
  const ANIMS = [
    {id:'bloom', label:'Bloom Open — petals unfurl from the seal'},
    {id:'rise', label:'Gentle Rise — the letter floats up softly'},
    {id:'firefly', label:'Firefly Glow — little lights drift up first'}
  ];

  let profile = null;
  let letters = []; // index metadata: {id,title,scene,status,createdAt,code}
  let current = null; // full letter object being edited
  let draggingSticker = null;
  let selectedStickerId = null;

  function uid(){ return Math.random().toString(36).slice(2,10); }
  function genCode(){ return uid().slice(0,4)+'-'+uid().slice(0,4); }

  function show(screenId){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  }

  async function safeGet(key, shared){
    try{
      const r = await window.storage.get(key, !!shared);
      return r ? r.value : null;
    }catch(e){ return null; }
  }
  async function safeSet(key, value, shared){
    try{ await window.storage.set(key, value, !!shared); return true; }
    catch(e){ console.error('storage set failed', e); return false; }
  }

  // ---------------- INIT ----------------
  async function init(){
    const p = await safeGet('profile', false);
    if(p){
      profile = JSON.parse(p);
      await loadIndex();
      renderDashboard();
      show('screen-dashboard');
    } else {
      show('screen-landing');
    }
  }

  async function loadIndex(){
    const idx = await safeGet('letters-index', false);
    letters = idx ? JSON.parse(idx) : [];
  }
  async function saveIndex(){
    await safeSet('letters-index', JSON.stringify(letters), false);
  }

  // ---------------- LANDING ----------------
  document.getElementById('begin-btn').addEventListener('click', async ()=>{
    const val = document.getElementById('name-input').value.trim();
    if(!val) return;
    profile = {name: val};
    await safeSet('profile', JSON.stringify(profile), false);
    await loadIndex();
    renderDashboard();
    show('screen-dashboard');
  });
  document.getElementById('name-input').addEventListener('keydown', e=>{
    if(e.key==='Enter') document.getElementById('begin-btn').click();
  });
  document.getElementById('have-code-btn').addEventListener('click', ()=> show('screen-viewer-entry'));
  document.getElementById('back-to-landing-btn').addEventListener('click', ()=> show(profile? 'screen-dashboard':'screen-landing'));
  document.getElementById('open-code-from-dash-btn').addEventListener('click', ()=> show('screen-viewer-entry'));

  document.getElementById('open-code-btn').addEventListener('click', openByCode);
  document.getElementById('code-input').addEventListener('keydown', e=>{ if(e.key==='Enter') openByCode(); });

  async function openByCode(){
    const code = document.getElementById('code-input').value.trim().toLowerCase();
    if(!code) return;
    const data = await safeGet('shared:'+code, true);
    if(!data){
      alert("Hmm, that code didn't match a letter. Double check it and try again.");
      return;
    }
    const letter = JSON.parse(data);
    show('screen-viewer');
    setupViewer(letter);
  }

  // ---------------- DASHBOARD ----------------
  function renderDashboard(){
    document.getElementById('dash-greeting').textContent = profile.name ? ('Hi ' + profile.name + ', your letters') : 'Your letters';
    const grid = document.getElementById('letters-grid');
    grid.innerHTML = '';
    if(letters.length===0){
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
        <div style="font-size:40px;">🌸</div>
        <p>Nothing here yet — write someone something beautiful.</p>
      </div>`;
      return;
    }
    letters.slice().reverse().forEach(l=>{
      const scene = SCENES.find(s=>s.id===l.scene) || SCENES[0];
      const card = document.createElement('button');
      card.className = 'letter-card';
      card.innerHTML = `
        <div class="letter-thumb ${scene.class}"></div>
        <div class="letter-body-pad">
          <h3>${escapeHtml(l.title || 'Untitled letter')}</h3>
          <div class="letter-meta">
            <span>${new Date(l.createdAt).toLocaleDateString()}</span>
            <span class="status-pill ${l.status==='sent'?'status-sent':'status-draft'}">${l.status==='sent'?'Sent':'Draft'}</span>
          </div>
        </div>`;
      card.addEventListener('click', ()=> openEditor(l.id));
      grid.appendChild(card);
    });
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  document.getElementById('new-letter-btn').addEventListener('click', ()=> openEditor(null));
  document.getElementById('back-to-dash-btn').addEventListener('click', async ()=>{
    await loadIndex();
    renderDashboard();
    show('screen-dashboard');
  });

  // ---------------- EDITOR ----------------
  function newLetter(){
    return {
      id: uid(),
      title:'',
      body:'',
      scene:'garden',
      accent: ACCENTS[0],
      stickers: [],
      animation:'bloom',
      status:'draft',
      code:null,
      createdAt: Date.now()
    };
  }

  async function openEditor(id){
    if(id){
      const data = await safeGet('letter:'+id, false);
      current = data ? JSON.parse(data) : newLetter();
    } else {
      current = newLetter();
    }
    buildEditorRail();
    document.getElementById('title-input').value = current.title;
    document.getElementById('body-input').value = current.body;
    renderPreview();
    show('screen-editor');
  }

  function buildEditorRail(){
    // scenes
    const sceneWrap = document.getElementById('scene-options');
    sceneWrap.innerHTML='';
    SCENES.forEach(s=>{
      const el = document.createElement('div');
      el.className = 'scene-swatch ' + s.class + (current.scene===s.id?' selected':'');
      el.title = s.label;
      el.tabIndex = 0;
      el.setAttribute('role','button');
      el.setAttribute('aria-label','Scene: '+s.label);
      el.addEventListener('click', ()=>{ current.scene=s.id; buildEditorRail(); renderPreview(); });
      sceneWrap.appendChild(el);
    });
    // colors
    const colorWrap = document.getElementById('color-options');
    colorWrap.innerHTML='';
    ACCENTS.forEach(c=>{
      const el = document.createElement('div');
      el.className = 'color-dot' + (current.accent===c?' selected':'');
      el.style.background = c;
      el.tabIndex = 0;
      el.setAttribute('role','button');
      el.setAttribute('aria-label','Accent color '+c);
      el.addEventListener('click', ()=>{ current.accent=c; buildEditorRail(); renderPreview(); });
      colorWrap.appendChild(el);
    });
    // stickers
    const stickerWrap = document.getElementById('sticker-grid');
    stickerWrap.innerHTML='';
    STICKERS.forEach(em=>{
      const btn = document.createElement('button');
      btn.className = 'sticker-btn';
      btn.textContent = em;
      btn.setAttribute('aria-label','Add sticker '+em);
      btn.addEventListener('click', ()=>{
        current.stickers.push({id:uid(), emoji:em, x:40+Math.random()*20, y:35+Math.random()*20, rot:(Math.random()*30-15)});
        renderPreview();
      });
      stickerWrap.appendChild(btn);
    });
    // animations
    const animWrap = document.getElementById('anim-options');
    animWrap.innerHTML='';
    ANIMS.forEach(a=>{
      const el = document.createElement('button');
      el.className = 'anim-choice' + (current.animation===a.id?' selected':'');
      el.innerHTML = `<span class="anim-dot"></span><span>${a.label}</span>`;
      el.addEventListener('click', ()=>{ current.animation=a.id; buildEditorRail(); });
      animWrap.appendChild(el);
    });
  }

  function renderPreview(){
    const frame = document.getElementById('preview-frame');
    const scene = SCENES.find(s=>s.id===current.scene) || SCENES[0];
    frame.className = 'preview-frame ' + scene.class;
    document.getElementById('preview-title-txt').textContent = document.getElementById('title-input').value || current.title || 'A little heading…';
    document.getElementById('preview-body-txt').textContent = document.getElementById('body-input').value || current.body || 'Your letter will appear here as you write it.';
    document.getElementById('preview-title-txt').style.color = current.accent;

    // remove old stickers
    document.querySelectorAll('.sticker-el').forEach(e=>e.remove());
    const canvas = document.getElementById('preview-canvas');
    current.stickers.forEach(st=>{
      const el = document.createElement('div');
      el.className = 'sticker-el';
      el.textContent = st.emoji;
      el.style.left = st.x + '%';
      el.style.top = st.y + '%';
      el.style.transform = 'rotate('+st.rot+'deg)';
      el.dataset.id = st.id;
      const rm = document.createElement('div');
      rm.className = 'sticker-remove';
      rm.textContent = '×';
      rm.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        current.stickers = current.stickers.filter(s=>s.id!==st.id);
        renderPreview();
      });
      el.appendChild(rm);
      el.addEventListener('pointerdown', (ev)=> startDrag(ev, st.id));
      el.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        document.querySelectorAll('.sticker-el').forEach(e=>e.classList.remove('selected'));
        el.classList.add('selected');
      });
      canvas.appendChild(el);
    });
  }

  function startDrag(ev, id){
    ev.preventDefault();
    draggingSticker = id;
    const el = ev.currentTarget;
    el.classList.add('dragging');
    const frame = document.getElementById('preview-frame');

    function move(e){
      const rect = frame.getBoundingClientRect();
      const clientX = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0].clientX);
      const clientY = e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0].clientY);
      let x = ((clientX - rect.left) / rect.width) * 100;
      let y = ((clientY - rect.top) / rect.height) * 100;
      x = Math.max(2, Math.min(92, x));
      y = Math.max(2, Math.min(92, y));
      const st = current.stickers.find(s=>s.id===id);
      if(st){ st.x = x; st.y = y; el.style.left = x+'%'; el.style.top = y+'%'; }
    }
    function up(){
      el.classList.remove('dragging');
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
    }
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  }

  document.getElementById('title-input').addEventListener('input', renderPreview);
  document.getElementById('body-input').addEventListener('input', renderPreview);

  async function persistCurrent(status){
    current.title = document.getElementById('title-input').value;
    current.body = document.getElementById('body-input').value;
    if(status) current.status = status;
    await safeSet('letter:'+current.id, JSON.stringify(current), false);
    const metaIdx = letters.findIndex(l=>l.id===current.id);
    const meta = {id:current.id, title:current.title, scene:current.scene, status:current.status, createdAt:current.createdAt, code:current.code};
    if(metaIdx>=0) letters[metaIdx] = meta; else letters.push(meta);
    await saveIndex();
  }

  document.getElementById('save-draft-btn').addEventListener('click', async ()=>{
    await persistCurrent('draft');
    await loadIndex();
    renderDashboard();
    show('screen-dashboard');
  });

  document.getElementById('get-link-btn').addEventListener('click', async ()=>{
    if(!current.code) current.code = genCode();
    await persistCurrent('sent');
    await safeSet('shared:'+current.code, JSON.stringify(current), true);
    const url = location.href.split('#')[0] + '#code=' + current.code;
    document.getElementById('modal-code').textContent = current.code;
    document.getElementById('copy-link-btn').onclick = ()=>{
      navigator.clipboard.writeText(url).then(()=>{
        document.getElementById('copy-link-btn').textContent = 'Copied!';
        setTimeout(()=> document.getElementById('copy-link-btn').textContent='Copy link', 1500);
      }).catch(()=>{});
    };
    document.getElementById('share-modal').classList.add('active');
  });
  document.getElementById('close-modal-btn').addEventListener('click', async ()=>{
    document.getElementById('share-modal').classList.remove('active');
    await loadIndex();
    renderDashboard();
    show('screen-dashboard');
  });

  // ---------------- VIEWER ----------------
  function setupViewer(letter){
    const stage = document.getElementById('viewer-stage');
    const scene = SCENES.find(s=>s.id===letter.scene) || SCENES[0];
    stage.className = 'viewer-stage ' + scene.class;
    stage.style.borderRadius = '20px';

    const envelope = document.getElementById('envelope');
    envelope.className = 'envelope';
    const viewerLetter = document.getElementById('viewer-letter');
    viewerLetter.className = 'viewer-letter';
    document.getElementById('viewer-hint').textContent = 'tap the envelope to open';
    document.getElementById('viewer-hint').style.display = 'block';

    document.getElementById('viewer-title-txt').textContent = letter.title || 'A little heading…';
    document.getElementById('viewer-title-txt').style.color = letter.accent || 'var(--plum)';
    document.getElementById('viewer-body-txt').textContent = letter.body || '';

    // clear old decorations
    stage.querySelectorAll('.bloom-petal, .firefly, .viewer-sticker').forEach(e=>e.remove());

    const clone = envelope.cloneNode(true);
    envelope.parentNode.replaceChild(clone, envelope);
    clone.addEventListener('click', ()=> revealLetter(letter, stage, clone, viewerLetter), {once:true});
  }

  function revealLetter(letter, stage, envelope, viewerLetter){
    document.getElementById('viewer-hint').style.display = 'none';

    if(letter.animation === 'bloom'){
      spawnPetals(stage, 14);
    }
    if(letter.animation === 'firefly'){
      spawnFireflies(stage, 10);
    }

    envelope.classList.add('opening');
    setTimeout(()=>{
      envelope.classList.add('hidden');
      viewerLetter.classList.add('show');
      // place stickers on viewer letter
      (letter.stickers||[]).forEach(st=>{
        const el = document.createElement('div');
        el.className = 'sticker-el viewer-sticker';
        el.style.position='absolute';
        el.style.left = st.x+'%';
        el.style.top = st.y+'%';
        el.style.transform = 'rotate('+st.rot+'deg)';
        el.style.fontSize = '28px';
        el.textContent = st.emoji;
        viewerLetter.appendChild(el);
      });
    }, letter.animation==='rise' ? 300 : 700);
  }

  function spawnPetals(stage, n){
    for(let i=0;i<n;i++){
      const p = document.createElement('div');
      p.className = 'bloom-petal';
      const size = 8 + Math.random()*10;
      p.style.width = size+'px';
      p.style.height = size+'px';
      p.style.left = (30+Math.random()*40)+'%';
      p.style.top = '40%';
      p.style.background = ['#F3C6D0','#E8A6B6','#C9BFE8','#B7CDA8'][i%4];
      p.style.animation = 'fallPetal ' + (1.4+Math.random()*1.2) + 's ease-out ' + (Math.random()*0.4) + 's forwards';
      stage.appendChild(p);
      setTimeout(()=>p.remove(), 3200);
    }
  }
  function spawnFireflies(stage, n){
    for(let i=0;i<n;i++){
      const f = document.createElement('div');
      f.className = 'firefly';
      f.style.left = (20+Math.random()*60)+'%';
      f.style.top = (55+Math.random()*20)+'%';
      f.style.animation = 'floatFly ' + (1.6+Math.random()*1.2) + 's ease-out ' + (Math.random()*0.5) + 's forwards';
      stage.appendChild(f);
      setTimeout(()=>f.remove(), 3400);
    }
  }

  // handle direct link with #code=
  async function checkHashCode(){
    const m = location.hash.match(/code=([a-z0-9-]+)/i);
    if(m){
      const code = m[1];
      const data = await safeGet('shared:'+code, true);
      if(data){
        show('screen-viewer');
        setupViewer(JSON.parse(data));
        return true;
      }
    }
    return false;
  }

  (async function boot(){
    const handled = await checkHashCode();
    if(!handled){
      await init();
    }
  })();

})();
</script>
</body>
</html>
